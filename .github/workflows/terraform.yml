name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write  # needed to post plan comments on PRs

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  TF_STATE_BUCKET: "paymentology-tf-state-562578955205"

jobs:
  terraform:
    name: ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=paymentology/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate

      # ── PR: plan only ──────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: |
          terraform plan -no-color -out=tfplan \
            -var="repl_pass=${{ secrets.TF_VAR_REPL_PASS }}"
        continue-on-error: true

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- tf-plan -->')
            );

            const fmt    = '${{ steps.fmt.outcome }}';
            const init   = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan   = '${{ steps.plan.outcome }}';

            const output = `<!-- tf-plan -->
            #### Terraform Format \`${ fmt === 'success' ? '✅' : '⚠️' }\`
            #### Terraform Init \`${ init === 'success' ? '✅' : '❌' }\`
            #### Terraform Validate \`${ validate === 'success' ? '✅' : '❌' }\`
            #### Terraform Plan \`${ plan === 'success' ? '✅' : '❌' }\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output,
              });
            }

      - name: Fail if plan failed
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      # ── main: apply ────────────────────────────────────────────────────────
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="repl_pass=${{ secrets.TF_VAR_REPL_PASS }}"
